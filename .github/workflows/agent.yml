name: Job Agent

on:
  schedule:
    # Twice daily — 09:00 and 19:00 IST (03:30 and 13:30 UTC)
    - cron: "30 3 * * *"
    - cron: "30 13 * * *"
  workflow_dispatch: {}

concurrency:
  group: job-agent
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Run agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AI_MODEL: ${{ vars.AI_MODEL || 'claude-sonnet-4-5' }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_TO_EMAIL: ${{ vars.DIGEST_TO_EMAIL }}
          DIGEST_FROM_EMAIL: ${{ vars.DIGEST_FROM_EMAIL }}
        run: npm run run:agent

      - name: Commit state + digest
        run: |
          git config user.name  "job-agent-bot"
          git config user.email "job-agent-bot@users.noreply.github.com"
          git add data/applications.json digests/ || true
          if ! git diff --cached --quiet; then
            git commit -m "chore(agent): digest + state update [skip ci]"
            git push
          else
            echo "no state changes"
          fi
